name: Build Native Java APK

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Assemble verified payload
        run: |
          find native-payload -maxdepth 1 -type f \( -name 'head-*' -o -name 'rest-*' \) -print0 | sort -z | xargs -0 cat > native-payload-combined.b64
          test "$(wc -c < native-payload-combined.b64)" -eq 29108
          test "$(sha256sum native-payload-combined.b64 | cut -d' ' -f1)" = "239f80a0a953450c57b7c45a47aad7319060403ad903f54ddcd48ce9a25902f6"
      - name: Restore project
        run: |
          base64 --decode native-payload-combined.b64 > native-project-fixed.tar.gz
          test "$(sha256sum native-project-fixed.tar.gz | cut -d' ' -f1)" = "d9830c86d8de65e2567c74a1d65fd5408cfcfd6ac7892add1a5fec985a916e2c"
          gzip -t native-project-fixed.tar.gz
          tar -xzf native-project-fixed.tar.gz
      - name: Apply safe system insets
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('AlHasibat-Native-Java/app/src/main/java/com/aborayan/alhasibat/MainActivity.java')
          s = p.read_text(encoding='utf-8')
          if 'import android.os.Build;' not in s:
              s = s.replace('import android.os.Bundle;\n', 'import android.os.Build;\nimport android.os.Bundle;\n')
          if 'import android.view.WindowInsetsController;' not in s:
              s = s.replace('import android.view.Window;\n', 'import android.view.Window;\nimport android.view.WindowInsetsController;\n')

          start = s.index('    private void configureSystemBars() {')
          end = s.index('    private void buildRoot() {', start)
          replacement = '''    private void configureSystemBars() {
              Window w = getWindow();
              w.setStatusBarColor(ribbon);
              w.setNavigationBarColor(bg);
              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                  w.setDecorFitsSystemWindows(false);
                  WindowInsetsController controller = w.getInsetsController();
                  if (controller != null) {
                      int mask = WindowInsetsController.APPEARANCE_LIGHT_STATUS_BARS
                              | WindowInsetsController.APPEARANCE_LIGHT_NAVIGATION_BARS;
                      controller.setSystemBarsAppearance(light ? mask : 0, mask);
                  }
              } else {
                  int flags = 0;
                  if (light && Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) flags |= View.SYSTEM_UI_FLAG_LIGHT_STATUS_BAR;
                  if (light && Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) flags |= View.SYSTEM_UI_FLAG_LIGHT_NAVIGATION_BAR;
                  w.getDecorView().setSystemUiVisibility(flags);
              }
          }

          @SuppressWarnings("deprecation")
          private void applySafeSystemInsets(View target) {
              target.setOnApplyWindowInsetsListener((view, insets) -> {
                  view.setPadding(
                          insets.getSystemWindowInsetLeft(),
                          insets.getSystemWindowInsetTop(),
                          insets.getSystemWindowInsetRight(),
                          insets.getSystemWindowInsetBottom());
                  return insets;
              });
              target.requestApplyInsets();
          }

          '''
          s = s[:start] + replacement + s[end:]
          marker = '        setContentView(root);'
          if 'applySafeSystemInsets(root);' not in s:
              s = s.replace(marker, marker + '\n        applySafeSystemInsets(root);', 1)
          p.write_text(s, encoding='utf-8')

          g = Path('AlHasibat-Native-Java/app/build.gradle')
          t = g.read_text(encoding='utf-8').replace('versionCode 2', 'versionCode 3').replace("versionName '2.0-native'", "versionName '2.1-native-insets'")
          g.write_text(t, encoding='utf-8')
          PY
      - name: Verify native only
        run: |
          test ! -d AlHasibat-Native-Java/app/src/main/assets
          test -z "$(find AlHasibat-Native-Java -iname '*.html' -print -quit)"
          ! grep -R "WebView\|android.webkit" AlHasibat-Native-Java/app/src/main
          grep -q "applySafeSystemInsets(root)" AlHasibat-Native-Java/app/src/main/java/com/aborayan/alhasibat/MainActivity.java
      - name: Build APK
        run: gradle -p AlHasibat-Native-Java --no-daemon :app:assembleDebug
      - run: cp AlHasibat-Native-Java/app/build/outputs/apk/debug/app-debug.apk AlHasibat-Native-Java/app/build/outputs/apk/debug/AlHasibat-Native-Java-v2.1.apk
      - uses: actions/upload-artifact@v4
        with:
          name: AlHasibat-Native-Java-v2.1-APK
          path: AlHasibat-Native-Java/app/build/outputs/apk/debug/AlHasibat-Native-Java-v2.1.apk
          if-no-files-found: error
          retention-days: 30