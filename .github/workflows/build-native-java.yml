name: Build Native Java APK

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Extract native Java project
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64, tarfile
          p=Path('native-project.tar.gz')
          data=p.read_bytes()
          print('archive bytes:', len(data), 'magic:', data[:8].hex())
          if not data.startswith(b'\x1f\x8b'):
              data=base64.b64decode(data)
              p.write_bytes(data)
              print('decoded bytes:', len(data), 'magic:', data[:8].hex())
          with tarfile.open(p, 'r:gz') as t:
              t.extractall('.')
          PY

      - name: Verify native-only sources
        run: |
          test ! -d AlHasibat-Native-Java/app/src/main/assets
          test -z "$(find AlHasibat-Native-Java -iname '*.html' -print -quit)"
          ! grep -R "WebView\|android.webkit" AlHasibat-Native-Java/app/src/main

      - name: Build native APK
        run: gradle -p AlHasibat-Native-Java --no-daemon :app:assembleDebug

      - name: Rename APK
        run: cp AlHasibat-Native-Java/app/build/outputs/apk/debug/app-debug.apk AlHasibat-Native-Java/app/build/outputs/apk/debug/AlHasibat-Native-Java-v2.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AlHasibat-Native-Java-APK
          path: AlHasibat-Native-Java/app/build/outputs/apk/debug/AlHasibat-Native-Java-v2.apk
          if-no-files-found: error
          retention-days: 30
