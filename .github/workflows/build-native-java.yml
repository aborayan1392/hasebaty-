name: Build Native Java APK

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Restore native Java project
        run: |
          cat native-payload/part00 native-payload/part01 \
              native-payload/rest-aa native-payload/rest-ab \
              native-payload/rest-ac native-payload/rest-ad \
              native-payload/rest-ae \
            | base64 --decode > native-project-fixed.tar.gz
          gzip -t native-project-fixed.tar.gz
          tar -xzf native-project-fixed.tar.gz

      - name: Verify native-only sources
        run: |
          test ! -d AlHasibat-Native-Java/app/src/main/assets
          test -z "$(find AlHasibat-Native-Java -iname '*.html' -print -quit)"
          ! grep -R "WebView\|android.webkit" AlHasibat-Native-Java/app/src/main

      - name: Build native APK
        run: gradle -p AlHasibat-Native-Java --no-daemon :app:assembleDebug

      - name: Rename APK
        run: cp AlHasibat-Native-Java/app/build/outputs/apk/debug/app-debug.apk AlHasibat-Native-Java/app/build/outputs/apk/debug/AlHasibat-Native-Java-v2.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AlHasibat-Native-Java-APK
          path: AlHasibat-Native-Java/app/build/outputs/apk/debug/AlHasibat-Native-Java-v2.apk
          if-no-files-found: error
          retention-days: 30
