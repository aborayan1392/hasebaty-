name: Build Rafiq Shopping Native Java

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    if: github.head_ref == 'shopping-companion-native-java' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Restore native Java project
        run: |
          cat rafiq-payload/part* | tr -d '\n\r' > /tmp/rafiq.b64
          base64 --decode /tmp/rafiq.b64 > /tmp/RafiqShoppingNative.tar.gz
          echo "b0ac0c46fe3ade70741ef07b52f877a8bcd45a61cea66d59d9793a7a34e5bb67  /tmp/RafiqShoppingNative.tar.gz" | sha256sum -c -
          tar -xzf /tmp/RafiqShoppingNative.tar.gz
      - name: Install custom launcher icon
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq imagemagick
          base64 --decode rafiq-icon-v1.1.b64 > /tmp/rafiq-icon.png
          RES=RafiqShoppingNative/app/src/main/res
          mkdir -p "$RES/drawable-nodpi"
          cp /tmp/rafiq-icon.png "$RES/drawable-nodpi/ic_launcher_basket_foreground.png"
          for pair in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
            dpi="${pair%%:*}"; size="${pair##*:}"
            mkdir -p "$RES/mipmap-$dpi"
            convert -size ${size}x${size} xc:black /tmp/rafiq-icon.png -resize $((size*78/100))x$((size*78/100)) -gravity center -composite "$RES/mipmap-$dpi/ic_launcher.png"
            cp "$RES/mipmap-$dpi/ic_launcher.png" "$RES/mipmap-$dpi/ic_launcher_round.png"
          done
          sed -i "s/versionCode 1/versionCode 2/; s/versionName '1.0-native'/versionName '1.1-native-custom-icon'/" RafiqShoppingNative/app/build.gradle
      - name: Align scanner dependencies
        run: |
          cat >> RafiqShoppingNative/app/build.gradle <<'GRADLE'

          configurations.configureEach {
              resolutionStrategy.force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }
          GRADLE
      - name: Verify native-only Android project
        run: |
          test -z "$(find RafiqShoppingNative -iname '*.html' -print -quit)"
          ! grep -R "WebView\|android.webkit" RafiqShoppingNative/app/src/main
          test -f RafiqShoppingNative/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          test -f RafiqShoppingNative/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          test -s RafiqShoppingNative/app/src/main/res/drawable-nodpi/ic_launcher_basket_foreground.png
          grep -q "journeyapps" RafiqShoppingNative/app/build.gradle
      - name: Build APK
        shell: bash
        run: |
          set -o pipefail
          gradle -p RafiqShoppingNative --no-daemon :app:assembleDebug --stacktrace 2>&1 | tee rafiq-build.log
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Rafiq-Shopping-Build-Log-v1.1
          path: rafiq-build.log
          if-no-files-found: ignore
          retention-days: 3
      - name: Package APK
        run: cp RafiqShoppingNative/app/build/outputs/apk/debug/app-debug.apk Rafiq-Shopping-Native-Java-v1.1-Custom-Icon.apk
      - uses: actions/upload-artifact@v4
        with:
          name: Rafiq-Shopping-Native-Java-v1.1-APK
          path: Rafiq-Shopping-Native-Java-v1.1-Custom-Icon.apk
          if-no-files-found: error
          retention-days: 30
