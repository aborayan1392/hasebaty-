name: Build Rafiq Shopping Native Java

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    if: github.head_ref == 'shopping-companion-native-java' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Restore native Java project
        run: |
          cat rafiq-payload/part* | tr -d '\n\r' > /tmp/rafiq.b64
          base64 --decode /tmp/rafiq.b64 > /tmp/RafiqShoppingNative.tar.gz
          echo "b0ac0c46fe3ade70741ef07b52f877a8bcd45a61cea66d59d9793a7a34e5bb67  /tmp/RafiqShoppingNative.tar.gz" | sha256sum -c -
          tar -xzf /tmp/RafiqShoppingNative.tar.gz

      - name: Install full safe launcher icon v1.3
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pil
          base64 --decode rafiq-icon-v1.1.b64 > /tmp/rafiq-source.png
          python3 - <<'PY'
          from PIL import Image
          src = Image.open('/tmp/rafiq-source.png').convert('RGB')
          canvas = Image.new('RGB', (512, 512), 'black')
          target = int(512 * 0.54)
          src = src.resize((target, target), Image.Resampling.LANCZOS)
          canvas.paste(src, ((512-target)//2, (512-target)//2))
          canvas.save('/tmp/rafiq-safe.png', optimize=True)
          PY
          RES=RafiqShoppingNative/app/src/main/res
          mkdir -p "$RES/drawable-nodpi" "$RES/mipmap-anydpi-v26"
          cp /tmp/rafiq-safe.png "$RES/drawable-nodpi/ic_rafiq_basket_full_foreground.png"
          for dpi in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p "$RES/mipmap-$dpi"
            cp /tmp/rafiq-safe.png "$RES/mipmap-$dpi/ic_rafiq_basket_full.png"
            cp /tmp/rafiq-safe.png "$RES/mipmap-$dpi/ic_rafiq_basket_full_round.png"
          done
          cat > "$RES/mipmap-anydpi-v26/ic_rafiq_basket_full.xml" <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@android:color/black" />
              <foreground android:drawable="@drawable/ic_rafiq_basket_full_foreground" />
          </adaptive-icon>
          XML
          cat > "$RES/mipmap-anydpi-v26/ic_rafiq_basket_full_round.xml" <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@android:color/black" />
              <foreground android:drawable="@drawable/ic_rafiq_basket_full_foreground" />
          </adaptive-icon>
          XML
          python3 - <<'PY'
          from pathlib import Path
          import re
          p = Path('RafiqShoppingNative/app/src/main/AndroidManifest.xml')
          s = p.read_text(encoding='utf-8')
          s = re.sub(r'android:icon="@mipmap/[^"]+"', 'android:icon="@mipmap/ic_rafiq_basket_full"', s)
          s = re.sub(r'android:roundIcon="@mipmap/[^"]+"', 'android:roundIcon="@mipmap/ic_rafiq_basket_full_round"', s)
          p.write_text(s, encoding='utf-8')
          g = Path('RafiqShoppingNative/app/build.gradle')
          t = g.read_text(encoding='utf-8')
          t = re.sub(r'versionCode\s+\d+', 'versionCode 4', t)
          t = re.sub(r"versionName\s+'[^']+'", "versionName '1.3-native-full-icon'", t)
          g.write_text(t, encoding='utf-8')
          PY

      - name: Align scanner dependencies
        run: |
          cat >> RafiqShoppingNative/app/build.gradle <<'GRADLE'

          configurations.configureEach {
              resolutionStrategy.force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
          }
          GRADLE

      - name: Verify icon in project and native-only app
        run: |
          test -z "$(find RafiqShoppingNative -iname '*.html' -print -quit)"
          ! grep -R "WebView\|android.webkit" RafiqShoppingNative/app/src/main
          grep -q '@mipmap/ic_rafiq_basket_full' RafiqShoppingNative/app/src/main/AndroidManifest.xml
          grep -q '@mipmap/ic_rafiq_basket_full_round' RafiqShoppingNative/app/src/main/AndroidManifest.xml
          test -s RafiqShoppingNative/app/src/main/res/drawable-nodpi/ic_rafiq_basket_full_foreground.png
          grep -q 'journeyapps' RafiqShoppingNative/app/build.gradle

      - name: Build APK
        shell: bash
        run: |
          set -o pipefail
          gradle -p RafiqShoppingNative --no-daemon :app:assembleDebug --stacktrace 2>&1 | tee rafiq-build.log

      - name: Verify icon inside APK
        run: |
          APK=RafiqShoppingNative/app/build/outputs/apk/debug/app-debug.apk
          unzip -l "$APK" | grep -q 'res/.*ic_rafiq_basket_full'
          test -s "$APK"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Rafiq-Shopping-Build-Log-v1.3
          path: rafiq-build.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Package APK
        run: cp RafiqShoppingNative/app/build/outputs/apk/debug/app-debug.apk Rafiq-Shopping-Native-Java-v1.3-Full-Icon.apk

      - uses: actions/upload-artifact@v4
        with:
          name: Rafiq-Shopping-Native-Java-v1.3-APK
          path: Rafiq-Shopping-Native-Java-v1.3-Full-Icon.apk
          if-no-files-found: error
          retention-days: 30
