name: Build Android APK

on:
  push:
    branches: [android-java-build]
    paths:
      - 'android-java/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android-java/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Restore bundled HTML
        run: |
          mkdir -p android-java/app/src/main/assets
          cat android-java/app/src/main/assets_compressed/index.html.gz.b64.part* | base64 --decode | gzip -d > android-java/app/src/main/assets/index.html
          test -s android-java/app/src/main/assets/index.html

      - name: Build debug APK
        run: gradle -p android-java --no-daemon :app:assembleDebug

      - name: Rename APK
        run: cp android-java/app/build/outputs/apk/debug/app-debug.apk android-java/app/build/outputs/apk/debug/AlHasibat-v1.0.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AlHasibat-APK
          path: android-java/app/build/outputs/apk/debug/AlHasibat-v1.0.apk
          if-no-files-found: error
          retention-days: 30
